    # Canonical reward templates (same reward format as quests.yml).
    # This lets you copy-paste reward blocks between manual quests and generated templates.
    # If templates are present, the generator prioritizes them over the legacy tiered ranges below.
    templates:
      - weight: 35
        tiers: [common, uncommon]
        min-difficulty: easy
        reward:
          xp: 80
          money: 45
          sigils: 15
          items:
            - material: BREAD
              amount: 8
              chance: 100
          commands:
            - "say {player} completed a generated quest."
          command-chance: 35
      - weight: 25
        tiers: [rare, epic]
        min-difficulty: normal
