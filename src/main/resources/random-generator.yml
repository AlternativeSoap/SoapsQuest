  # ═══════════════════════════════════════════════════════════════════════════
  # MYTHICMOBS CONFIGURATION
  # ═══════════════════════════════════════════════════════════════════════════
  # Add your MythicMobs internal mob names to the pool below.
  # These must match exactly the mob IDs from your MythicMobs config.
  # Example:
  #   pool:
  #     - SkeletalKnight
  #     - SkeletonKing
  #     - FireDemon
  mythicmobs:
    enabled: false
    pool: []

  objectives:
    
    # All objectives now use the unified "target" field for consistency
    
    # ═══════════════════════════════════════════════════════════════════
    # COMBAT OBJECTIVES
    # ═══════════════════════════════════════════════════════════════════
    
    kill_hostile:
      objective: kill
      target: [ZOMBIE, SKELETON, CREEPER, SPIDER]
      amount-by-difficulty:
        easy: [10, 25]
        normal: [20, 40]
        hard: [40, 75]
        nightmare: [75, 150]
    
    kill_zombies:
      objective: kill
      target: [ZOMBIE]
      amount: [15, 40]
    
    kill_skeletons:
      objective: kill
      target: [SKELETON]
      amount: [10, 35]
    
    kill_creepers:
      objective: kill
      target: [CREEPER]
      amount: [5, 20]
    
    kill_spiders:
      objective: kill
      target: [SPIDER, CAVE_SPIDER]
      amount: [15, 45]
    
    kill_endermen:
      objective: kill
      target: [ENDERMAN]
      amount: [5, 15]
    
    kill_nether_mobs:
      objective: kill
      target: [BLAZE, WITHER_SKELETON, PIGLIN, ZOMBIFIED_PIGLIN]
      amount: [10, 30]
    
    kill_ocean_mobs:
      objective: kill
      target: [DROWNED, GUARDIAN, ELDER_GUARDIAN]
      amount: [8, 25]
    
    kill_bosses:
      objective: kill
      target: [WITHER, ENDER_DRAGON]
      amount: [1, 3]
    
    kill_breeze:
      objective: kill
      target: [BREEZE]
      amount: [5, 15]
    
    kill_armadillo:
      objective: kill
      target: [ARMADILLO]
      amount: [3, 10]
    
    deal_damage:
      objective: damage
      amount-by-difficulty:
        easy: [50, 200]
        normal: [100, 500]
        hard: [300, 1000]
        nightmare: [500, 2000]
    
    shoot_arrows:
      objective: bowshoot
      amount: [10, 100]
    
    throw_projectiles:
      objective: projectile
      target: [SNOWBALL, EGG, ENDER_PEARL]
      amount: [10, 100]
    
    die_once:
      objective: death
      amount: [1, 3]
    
    die_many:
      objective: death
      amount: [5, 15]
    
    # ═══════════════════════════════════════════════════════════════════
    # MINING & BUILDING OBJECTIVES
    # ═══════════════════════════════════════════════════════════════════
    
