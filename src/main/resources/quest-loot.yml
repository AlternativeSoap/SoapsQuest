# ════════════════════════════════════════════════════════════════════════════
# SoapsQuest — Quest Loot System (Premium)
# ════════════════════════════════════════════════════════════════════════════
#
# Adds quest papers to naturally generated chest loot and mob drops.
# Players who find these unbound papers are automatically bound to them
# when they pick the paper up for the first time.
#
# ─── HOW SOURCE MODES WORK ───────────────────────────────────────────────
#   manual  →  picks a random quest from the "quests" list in this file
#   random  →  generates a brand-new quest via random-generator.yml (Premium)
#   mixed   →  50 % manual, 50 % random each roll
#
# ─── WORLD FILTERS ────────────────────────────────────────────────────────
#   Leave the worlds list empty ([]) to allow loot in all worlds.
#   Only worlds listed will produce quest loot when the list is non-empty.
#
# ─── MOB QUEST POOL ───────────────────────────────────────────────────────
#   mobs.quests is an optional separate pool for mob drops.
#   When empty or omitted, mob drops use the chest quest pool as a fallback.
#
# ════════════════════════════════════════════════════════════════════════════

quest-loot:

  # ─── Master Control ───────────────────────────────────────────────────────
  enabled: false                        # Global toggle for the entire loot system

  # Maximum quest papers that can drop from a single loot event.
  # Prevents loot spam if chance % is set very high.
  max-per-event: 4

  # ─── Chest Loot ───────────────────────────────────────────────────────────
  chest:
    enabled: true
    chance: 10                          # % chance a quest paper appears per chest opening
    amount-min: 1                       # Minimum quest papers per chest event
    amount-max: 2                       # Maximum quest papers per chest event

    # World filter — empty list = all worlds allowed
    worlds:
      - "world"
      - "world_nether"

    # Source mode: manual | random | mixed
    source-mode: "manual"

    # Manual quest ID pool — used when source-mode is "manual" or "mixed".
    # IDs must match quest keys in quests.yml.
    quests:
      - "lumberjack"
      - "zombie_slayer"
      - "gone_fishing"
      - "iron_miner"
      - "mob_hunter"

  # ─── Mob Drop Loot ────────────────────────────────────────────────────────
  mobs:
    enabled: true
    default-chance: 5                   # Default % chance for any mob not listed under "types"

    # Source mode for mob drops: manual | random | mixed
    # When omitted, inherits the chest source-mode.
    source-mode: "manual"

    # World filter — empty list = all worlds allowed
    worlds:
      - "world"

    # Mob-specific quest pool (optional).
    # When empty or omitted, falls back to the chest quest pool above.
    quests:
      []
      # - "zombie_slayer"
      # - "mob_hunter"

    # Per-mob-type overrides.
    # Entity names must match Bukkit EntityType values (UPPER_CASE).
    # Fields per entry:
    #   chance     — % drop chance for this mob (overrides default-chance)
    #   amount-min — minimum papers dropped (default: 1)
    #   amount-max — maximum papers dropped (default: 1)
    types:

      # ── Overworld — common hostile ────────────────────────────────────────
      ZOMBIE:
        chance: 12
        amount-min: 1
        amount-max: 2

      HUSK:
        chance: 12
        amount-min: 1
        amount-max: 1

      ZOMBIE_VILLAGER:
        chance: 10
        amount-min: 1
        amount-max: 1

      DROWNED:
        chance: 12
        amount-min: 1
        amount-max: 1

      SKELETON:
        chance: 8
        amount-min: 1
        amount-max: 1

      STRAY:
        chance: 8
        amount-min: 1
        amount-max: 1

      BOGGED:
        chance: 8
        amount-min: 1
        amount-max: 1

      CREEPER:
        chance: 10
        amount-min: 1
        amount-max: 2

      SPIDER:
        chance: 7
        amount-min: 1
        amount-max: 1

      CAVE_SPIDER:
        chance: 8
        amount-min: 1
        amount-max: 1

      SLIME:
