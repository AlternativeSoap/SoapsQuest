# ╔════════════════════════════════════════════════════════════════════════════╗
# ║                        SoapsQuest Messages                                 ║
# ║  All plugin messages, notifications, and player communication             ║
# ║  Uses consistent color palette and formatting across all features         ║
# ║  See README.md for placeholders and detailed documentation                ║
