# ════════════════════════════════════════════════════════════════════════════
# SoapsQuest - Tier / Rarity System
# ════════════════════════════════════════════════════════════════════════════
#
# Tiers define the rarity of generated quests. You can add, remove, or rename
# tiers freely — the plugin loads them in the order they appear here.
#
# Fields per tier:
#   display  — Name shown to players (supports & color codes and MiniMessage)
#   prefix   — Short tag shown in quest lists, e.g. [RARE]
#   color    — Base color code applied to generic text for this tier
#   weight   — Relative spawn weight (higher = more common). Must be > 0.
#              Example: common=40, rare=25, mythic=8 → mythic is ~1-in-9 of all non-common picks
#   description — Shown in tooltips / GUIs (supports & color codes)
#
# Tip: Order matters — tiers are displayed in GUIs exactly as listed here.
# ════════════════════════════════════════════════════════════════════════════

tiers:
  common:
    display: "&fCommon"
    prefix: "&7[COMMON]"
    color: "&f"
    weight: 40
    description: "&7A standard quest available to all players."

  uncommon:
    display: "&2Uncommon"
    prefix: "&2[UNCOMMON]"
    color: "&2"
    weight: 32
    description: "&2Slightly rarer quests with modest rewards."

  rare:
    display: "&9Rare"
    prefix: "&9[RARE]"
    color: "&9"
    weight: 25
    description: "&9Quests worth seeking out for better loot."

  epic:
    display: "&5Epic"
    prefix: "&5[EPIC]"
    color: "&5"
    weight: 18
    description: "&5Challenging quests with substantial rewards."

  legendary:
    display: "&6Legendary"
    prefix: "&6[LEGENDARY]"
    color: "&6"
    weight: 12
    description: "&6Prestigious quests for dedicated adventurers."

  mythic:
    display: "&d&lMythic"
    prefix: "&d&l[MYTHIC]"
    color: "&d"
    weight: 8
    description: "&d&lThe rarest of quests — only the strongest survive."
