name: SoapsQuest
version: '${project.version}'
main: com.soaps.quest.SoapsQuest
api-version: '1.21'
description: Premium quest system with physical quest papers and advanced features.
depend: [SoapsCommon]
softdepend: [Vault, PlaceholderAPI, MythicMobs]

commands:
  soapsquest:
    description: Main quest command
    usage: /soapsquest <give|list|generate|reload|abandon|progress|addreward|removereward>
    aliases: [sq]
    permission: soapsquest.use

permissions:
  soapsquest.*:
    description: Gives access to all SoapsQuest permissions
    default: op
    children:
      soapsquest.use: true
      soapsquest.give: true
      soapsquest.list: true
      soapsquest.list.click: true
      soapsquest.generate: true
      soapsquest.reload: true
      soapsquest.progress: true
      soapsquest.progress.others: true
      soapsquest.addreward: true
      soapsquest.removereward: true
      soapsquest.statistic: true
      soapsquest.admin: true
      soapsquest.gui.browser: true
      soapsquest.gui.editor: true
      soapsquest.gui.myquests: true
      soapsquest.copy: true
      soapsquest.reset: true
      soapsquest.complete: true
      soapsquest.debug: true
      soapsquest.listreward: true
      soapsquest.remove: true
      soapsquest.abandon: true
      soapsquest.sigils: true
      soapsquest.drop: true
  
  soapsquest.use:
    description: Basic permission to use quest commands
    default: true
  
  soapsquest.give:
    description: Permission to give quest papers to players
    default: op
  
  soapsquest.list:
    description: Permission to list all available quests
    default: true
  
  soapsquest.list.click:
    description: Permission to click and claim quests from /sq list
    default: true
  
  soapsquest.generate:
    description: Permission to generate random quests
    default: op
  
  soapsquest.reload:
    description: Permission to reload plugin configuration
    default: op
  
  soapsquest.progress:
    description: Permission to check own quest progress
    default: true
  
  soapsquest.progress.others:
    description: Permission to check other players' quest progress
    default: op
  
  soapsquest.addreward:
    description: Permission to add rewards to quests
    default: op
  
  soapsquest.removereward:
    description: Permission to remove rewards from quests
    default: op
  
  soapsquest.statistic:
    description: Permission to view quest statistics
    default: true

  soapsquest.gui.browser:
    description: Permission to open the quest browser GUI
    default: true

  soapsquest.gui.editor:
    description: Permission to open the quest editor GUI
    default: op

  soapsquest.debug:
    description: Permission to toggle debug mode
    default: op

  soapsquest.listreward:
    description: Permission to list rewards on quests
    default: op

  soapsquest.remove:
    description: Permission to remove quests from config
    default: op

  soapsquest.admin:
    description: Permission to view other players' statistics and use admin commands
    default: op

  soapsquest.abandon:
    description: Permission to abandon quests
    default: true

  soapsquest.copy:
    description: Permission to copy a quest to a new ID
    default: op

  soapsquest.reset:
    description: Permission to reset a player's quest progress
    default: op

  soapsquest.complete:
    description: Permission to force-complete a player's quest
    default: op

  soapsquest.gui.myquests:
    description: Permission to open the active quests GUI
    default: true

  soapsquest.sigils:
    description: Permission to manage SoapsQuest Sigils balances
    default: op

  soapsquest.drop:
    description: Permission to drop quest papers into the world
    default: op